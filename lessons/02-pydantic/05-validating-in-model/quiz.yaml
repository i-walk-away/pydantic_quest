questions:
  - prompt: "What becomes better once validation is moved into `UserFormDTO` itself?"
    options:
      - "Python becomes statically typed"
      - "type hints stop being necessary in the model"
      - "business logic can safely assume it receives valid data"
    correct_option: 2

  - prompt: "What method is used in the dataclass example to run validation right after initialization?"
    options:
      - "`__post_init__`"
      - "`__validate__`"
      - "`__after_init__`"
    correct_option: 0

  - prompt: "What is the lesson's main payoff at the end?"
    options:
      - "Pydantic replaces dataclasses completely"
      - "we basically reinvented the core idea behind Pydantic"
      - "business logic should still keep the same validation checks just in case"
    correct_option: 1
