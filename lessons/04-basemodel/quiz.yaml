questions:
  - prompt: "What do you need to do to define a Pydantic model?"
    options:
      - "inherit from `BaseModel` and add type hints for class attributes"
      - "write a custom validator for every field before the model can work"
      - "start with a dataclass and then convert it into a model"
    correct_option: 0

  - prompt: "What does `BaseModel` handle for you by default?"
    options:
      - "runtime type validation based on your type hints"
      - "automatic business rule validation for every possible field value"
      - "serialization to JSON without ever validating the input"
    correct_option: 0

  - prompt: "What are you asked to do in this lesson?"
    options:
      - "define a `Pirate` model with `name`, `gold`, and `crimes` fields"
      - "write validators that reject pirates with too little gold"
      - "convert a `Pirate` dataclass into a subclass of `BaseModel`"
    correct_option: 0
