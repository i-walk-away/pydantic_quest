questions:
  - prompt: "What is a DTO?"
    options:
      - "a small object that carries structured data from one part of the program to another"
      - "a small object whose job is to do the actual business logic"
      - "a special object that automatically validates all incoming data in Python"
    correct_option: 0


  - prompt: "Why is `{\"username\": \"Alice\", \"age\": \"Albania\"}` a problem in the lesson example?"
    options:
      - "because the data will be rejected immediately when `UserFormDTO` is created"
      - "because the data is broken from the very beginning, but Python still lets it travel too far"
    correct_option: 1


  - prompt: "At which moment should the invalid age ideally be rejected?"
    options:
      - "at the earliest moment - right when we try to build `UserFormDTO` from the incoming user data"
      - "when `calculate_age()` actually tries to compute `age + 1`"
      - "when we pass `UserFormDTO` into `calculate_age()`"
    correct_option: 0
